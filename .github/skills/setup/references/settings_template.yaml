# Modular RAG MCP Server - Configuration Template
# Auto-generated by setup skill. Edit as needed.

# =============================================================================
# LLM Configuration
# =============================================================================
llm:
  provider: "{llm_provider}"  # Options: openai, azure, ollama, deepseek, qwen, gemini, ...
  model: "{llm_model}"
  deployment_name: "{llm_deployment_name}"
  azure_endpoint: "{llm_azure_endpoint}"
  api_version: "{llm_api_version}"
  api_key: "{llm_api_key}"
  base_url: "{llm_base_url}"
  temperature: 0.0
  max_tokens: 4096

# =============================================================================
# Embedding Configuration
# =============================================================================
embedding:
  provider: "{embed_provider}"  # Options: openai, azure, ollama, qwen, gemini, ...
  model: "{embed_model}"
  dimensions: {embed_dimensions}
  azure_endpoint: "{embed_azure_endpoint}"
  deployment_name: "{embed_deployment_name}"
  api_version: "{embed_api_version}"
  api_key: "{embed_api_key}"
  base_url: "{embed_base_url}"

# =============================================================================
# Vision LLM Configuration (for Image Captioning)
# =============================================================================
vision_llm:
  enabled: {vision_enabled}
  provider: "{vision_provider}"  # Options: openai, azure, ollama, qwen, gemini, ...
  model: "{vision_model}"
  azure_endpoint: "{vision_azure_endpoint}"
  deployment_name: "{vision_deployment_name}"
  api_version: "{vision_api_version}"
  api_key: "{vision_api_key}"
  base_url: "{vision_base_url}"
  max_image_size: 2048

# =============================================================================
# Vector Store Configuration
# =============================================================================
vector_store:
  provider: "chroma"
  persist_directory: "./data/db/chroma"
  collection_name: "knowledge_hub"

# =============================================================================
# Retrieval Configuration
# =============================================================================
retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  rrf_k: 60

# =============================================================================
# Rerank Configuration
# =============================================================================
rerank:
  enabled: {rerank_enabled}
  provider: "{rerank_provider}"
  model: "{rerank_model}"
  top_k: 5

# =============================================================================
# Evaluation Configuration
# =============================================================================
evaluation:
  enabled: false
  provider: "custom"
  metrics:
    - "hit_rate"
    - "mrr"
    - "faithfulness"

# =============================================================================
# Observability Configuration
# =============================================================================
observability:
  log_level: "INFO"
  trace_enabled: true
  trace_file: "./logs/traces.jsonl"
  structured_logging: true

# =============================================================================
# Ingestion Configuration
# =============================================================================
ingestion:
  chunk_size: 1000
  chunk_overlap: 200
  splitter: "recursive"
  batch_size: 100
  chunk_refiner:
    use_llm: true
  metadata_enricher:
    use_llm: true
