# Modular RAG MCP Server - Example Configuration
# Copy to config/settings.yaml and set secrets through environment variables.

llm:
  provider: "openai"  # Options: openai, azure, ollama, deepseek, bailian
  model: "gpt-4o-mini"
  deployment_name: "gpt-4o-mini"
  api_version: "${AZURE_OPENAI_API_VERSION:-2024-02-15-preview}"
  base_url: "${LLM_BASE_URL:-https://api.openai.com/v1}"
  api_key: "${LLM_API_KEY:-}"
  temperature: 0.0
  max_tokens: 4096
  # Alibaba Cloud Bailian / Model Studio example:
  # provider: "bailian"
  # model: "qwen-plus"
  # deployment_name: "qwen-plus"
  # base_url: "${BAILIAN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}"
  # api_key: "${DASHSCOPE_API_KEY:-}"
  # extra_body:
  #   enable_thinking: false

embedding:
  provider: "openai"  # Options: openai, azure, ollama
  model: "text-embedding-3-small"
  dimensions: 1536
  max_batch_size: 10  # Keep 10 for OpenAI-compatible gateways with stricter batch limits.
  base_url: "${EMBEDDING_BASE_URL:-https://api.openai.com/v1}"
  api_key: "${EMBEDDING_API_KEY:-}"

vision_llm:
  enabled: false
  provider: "openai"  # Options: openai, azure, ollama
  model: "gpt-4o-mini"
  base_url: "${VISION_LLM_BASE_URL:-https://api.openai.com/v1}"
  api_key: "${VISION_LLM_API_KEY:-}"
  max_image_size: 2048

vector_store:
  provider: "chroma"
  persist_directory: "./data/db/chroma"
  collection_name: "knowledge_hub"
  qdrant:
    url: "${QDRANT_URL:-}"
    api_key: "${QDRANT_API_KEY:-}"
    collection_name: "knowledge_hub"
  opensearch:
    hosts: "${OPENSEARCH_HOSTS:-}"
    username: "${OPENSEARCH_USERNAME:-}"
    password: "${OPENSEARCH_PASSWORD:-}"
    index_name: "knowledge_hub"
  pgvector:
    dsn: "${PGVECTOR_DSN:-}"
    table_name: "rag_chunks"
    embedding_dimension: 1536

retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  rrf_k: 60
  sparse_backend: "sqlite_fts5"  # Options: json_bm25, sqlite_fts5
  fts5:
    db_path: "./data/db/sparse_fts5.db"
    tokenizer: "unicode61"  # Options: unicode61, trigram
    match_mode: "or"  # Options: or, and
    busy_timeout_ms: 10000
    max_retries: 3
  query_rewrite:
    enabled: false
    provider: "noop"
    timeout_seconds: 3
    token_budget: 512
    fallback_on_error: true
    synonyms: {}
    abbreviations: {}
    max_generated_queries: 3
  tokenizer:
    engine: "jieba"
    user_dict_path: "config/domain_terms.txt"
    stopwords_path: "config/stopwords.txt"
    enable_char_ngram: false
    char_ngram_min: 2
    char_ngram_max: 3
  boosting:
    enabled: false
    title_boost: 1.20
    heading_boost: 1.15
    tag_boost: 1.10
    exact_phrase_boost: 1.25
    source_type_boost: {}

rerank:
  enabled: false
  provider: "none"  # Options: none, cross_encoder, llm, bailian
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  # Bailian/DashScope reranker example:
  # provider: "bailian"
  # model: "qwen3-vl-rerank"
  # endpoint: "https://your-endpoint/api/v1/services/rerank/text-rerank/text-rerank"
  # api_format: "dashscope"
  # qwen3-rerank compatible API example:
  # model: "qwen3-rerank"
  # endpoint: "https://your-workspace.cn-beijing.maas.aliyuncs.com/compatible-api/v1/reranks"
  # api_format: "compatible"
  # instruct: "Given a web search query, retrieve relevant passages that answer the query."
  # api_key: "${DASHSCOPE_API_KEY:-}"
  top_k: 5
  candidate_top_k: 20
  output_top_k: 5
  timeout_seconds: 10
  fallback_on_timeout: true
  fallback_on_error: true
  retry:
    enabled: false
    max_attempts: 1
    backoff_seconds: 0.5
  cost_limit:
    enabled: false
    max_candidates_per_query: 50
    max_estimated_cost_per_query: 0.05
    estimated_cost_per_candidate: 0.001
  circuit_breaker:
    enabled: false
    failure_threshold: 5
    reset_after_seconds: 60
  provider_switching:
    enabled: false
  return_documents: true

evaluation:
  enabled: false
  provider: "custom"
  metrics:
    - "hit_rate"
    - "mrr"
    - "faithfulness"

observability:
  log_level: "INFO"
  trace_enabled: true
  trace_file: "./logs/traces.jsonl"
  structured_logging: true
  environment: "development"
  audit_file: "./logs/audit.jsonl"
  operational_file: "./logs/operational.jsonl"
  redaction:
    enabled: true
    max_text_length: 256
    hash_user_id: true
  trace:
    include_chunk_text: false
    include_prompt: false
    sampling_rate: 1.0
  retention:
    max_days: 30
    max_file_size_mb: 100
    rotation_count: 5

security:
  enabled: true
  mode: "local-dev"
  require_tenant: false
  require_authentication: false
  default_local_tenant: "local"
  default_local_user: "local-user"
  jwt:
    issuer: "${JWT_ISSUER:-}"
    audience: "${JWT_AUDIENCE:-}"
    secret: "${JWT_SECRET:-}"
  acl:
    enabled: true

api:
  enabled: true
  host: "0.0.0.0"
  port: 8000
  environment: "development"
  auth:
    mode: "local-dev"
    allow_local_dev_without_auth: true
    jwt:
      algorithm: "HS256"
      secret: "${JWT_SECRET:-}"
      issuer: "${JWT_ISSUER:-rag-api}"
      audience: "${JWT_AUDIENCE:-rag-clients}"
      leeway_seconds: 30
  rate_limit:
    enabled: true
    backend: "memory"
    tenant:
      requests: 120
      window_seconds: 60
    user:
      requests: 60
      window_seconds: 60
  limits:
    max_request_body_bytes: 10485760
  timeout:
    query_seconds: 30
    retrieval_seconds: 8
    rerank_seconds: 10
    llm_seconds: 20
    ingestion_seconds: 300
  mcp_gateway:
    enabled: true

performance:
  query_cache:
    enabled: true
    max_size: 128
    ttl_seconds: 300
  embedding_cache:
    enabled: true
    db_path: "./data/db/embedding_cache.db"

response:
  answer_generation:
    enabled: true
    default_mode: "contexts"
    min_contexts: 1
    min_score: 0.2
    max_context_chars: 8000
    default_answer_style: "concise"
    timeout_seconds: 20
    hallucination_guard:
      enabled: true
  claim_extraction:
    enabled: true
    provider: "rule_based"
    max_claims: 20
    llm:
      enabled: false
  citation_verification:
    enabled: true
    min_support_score: 0.35
    require_citations_for_factual_claims: true
    allow_uncited_refusal_answer: true
  refusal:
    enabled: true
    refuse_on_no_context: true
    refuse_on_low_score: true
    refuse_on_no_valid_citation: true
    refuse_on_prompt_injection: true
    refuse_on_unsupported_claims: true
    low_score_threshold: 0.2
    max_unsupported_claim_ratio: 0.35
    min_citation_coverage: 0.5
  confidence:
    enabled: true
    high_threshold: 0.75
    medium_threshold: 0.45
  source_conflict:
    enabled: true
    strict_mode: false
  safety:
    prompt_injection_detection: true

ingestion:
  chunk_size: 1000
  chunk_overlap: 200
  splitter: "recursive"
  batch_size: 20
  concurrent_upload:
    enabled: true
    max_workers: 4
    job_db_path: "./data/db/ingestion_jobs.db"
    upload_dir: "./data/uploads/ingestion"
    storage_lock_scope: "collection"
  task_queue:
    backend: "sqlite"
    db_path: "./data/db/ingestion_tasks.db"
    lease_seconds: 300
    heartbeat_interval_seconds: 30
    max_retries: 3
    retry_base_delay_seconds: 10
    retry_max_delay_seconds: 300
    retry_jitter: true
  parsing:
    enhanced_pdf:
      enabled: true
      preserve_existing_loader: true
      ocr:
        enabled: false
        engine: "tesseract"
        languages: ["chi_sim", "eng"]
        min_text_density: 20
        min_ocr_confidence: 0.60
        fallback_on_missing_dependency: true
      layout:
        enabled: true
        extract_blocks: true
        extract_images: true
        extract_coordinates: true
        detect_reading_order: true
      tables:
        enabled: true
        engine: "auto"
        fallback_to_text: true
        extract_markdown: true
        extract_cell_coordinates: true
        detect_cross_page: true
      headers_footers:
        enabled: true
        similarity_threshold: 0.85
        min_repeat_pages: 2
        top_margin_ratio: 0.12
        bottom_margin_ratio: 0.12
        exclude_from_chunks: true
      quality:
        enabled: true
        min_text_density: 20
        max_garbled_ratio: 0.20
        max_empty_page_ratio: 0.50
        max_duplicate_block_ratio: 0.40
        reject_on_garbled: false
        warning_on_low_quality: true
  chunking:
    strategy: "recursive"
    chunk_size: 1000
    chunk_overlap: 200
    metadata:
      schema_validation: true
      validate_before_chunk: true
      validate_after_chunk: true
      validate_before_upsert: true
      validate_on_query_return: true
      strict_upsert_validation: true
    quality:
      enabled: true
      min_chars: 50
      max_chars: 3000
      max_garbled_ratio: 0.20
      max_duplicate_ratio: 0.40
      max_punctuation_ratio: 0.60
      reject_invalid: false
    section_aware:
      enabled: true
      max_section_chars: 3000
      merge_short_sections: true
    table_aware:
      enabled: true
      preserve_table_header: true
      max_table_rows_per_chunk: 30
    code_aware:
      enabled: true
      preserve_code_block: true
      max_code_lines_per_chunk: 120
    parent_child_retrieval:
      enabled: true
      return_parent_context: false
      max_parent_context_chars: 2000
    contextual_retrieval:
      enabled: false
      provider: "noop"
      preserve_original_text: true
      max_context_chars: 500
      cache:
        enabled: true
        db_path: "./data/db/contextualizer_cache.db"
      llm:
        enabled: false
        timeout_seconds: 20
        token_budget: 512
        fallback_on_error: true
        max_estimated_cost_per_document: 0.10
  supported_extensions:
    - ".pdf"
    - ".md"
    - ".txt"
    - ".html"
    - ".htm"
    - ".docx"
    - ".py"
    - ".js"
    - ".java"

  document_quality:
    enabled: true
    sample_pages: 3
    min_effective_char_ratio: 0.8
    min_recognizable_text_density: 20

  chunk_refiner:
    use_llm: false

  metadata_enrichment:
    enabled: true
    use_llm: false
    cache_enabled: true
    cache_path: "./data/cache/metadata_enrichment_cache.sqlite"
    max_tokens_per_chunk: 1200
    max_concurrency: 3
    budget_usd_per_run: 2.0
    estimated_cost_per_1k_tokens: 0.0005
    output_schema: "json"
    fallback_to_rule_based: true
    generate_questions: true
    extract_entities: true
    prompt_path: "config/prompts/metadata_enrichment_json.txt"

  # Legacy block kept for backward compatibility. Prefer metadata_enrichment.
  metadata_enricher:
    use_llm: false
