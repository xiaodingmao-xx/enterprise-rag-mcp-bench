# Modular RAG MCP Server - Example Configuration
# Copy to config/settings.yaml and set secrets through environment variables.

llm:
  provider: "openai"  # Options: openai, azure, ollama, deepseek
  model: "gpt-4o-mini"
  deployment_name: "gpt-4o-mini"
  api_version: "${AZURE_OPENAI_API_VERSION:-2024-02-15-preview}"
  base_url: "${LLM_BASE_URL:-https://api.openai.com/v1}"
  api_key: "${LLM_API_KEY:-}"
  temperature: 0.0
  max_tokens: 4096

embedding:
  provider: "openai"  # Options: openai, azure, ollama
  model: "text-embedding-3-small"
  dimensions: 1536
  base_url: "${EMBEDDING_BASE_URL:-https://api.openai.com/v1}"
  api_key: "${EMBEDDING_API_KEY:-}"

vision_llm:
  enabled: false
  provider: "openai"  # Options: openai, azure, ollama
  model: "gpt-4o-mini"
  base_url: "${VISION_LLM_BASE_URL:-https://api.openai.com/v1}"
  api_key: "${VISION_LLM_API_KEY:-}"
  max_image_size: 2048

vector_store:
  provider: "chroma"
  persist_directory: "./data/db/chroma"
  collection_name: "knowledge_hub"

retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  rrf_k: 60

rerank:
  enabled: false
  provider: "none"
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5

evaluation:
  enabled: false
  provider: "custom"
  metrics:
    - "hit_rate"
    - "mrr"
    - "faithfulness"

observability:
  log_level: "INFO"
  trace_enabled: true
  trace_file: "./logs/traces.jsonl"
  structured_logging: true

performance:
  query_cache:
    enabled: true
    max_size: 128
    ttl_seconds: 300
  embedding_cache:
    enabled: true
    db_path: "./data/db/embedding_cache.db"

ingestion:
  chunk_size: 1000
  chunk_overlap: 200
  splitter: "recursive"
  batch_size: 20
  supported_extensions:
    - ".pdf"
    - ".md"
    - ".txt"
    - ".html"
    - ".htm"
    - ".docx"
    - ".py"
    - ".js"
    - ".java"

  document_quality:
    enabled: true
    sample_pages: 3
    min_effective_char_ratio: 0.8
    min_recognizable_text_density: 20

  chunk_refiner:
    use_llm: false

  metadata_enrichment:
    enabled: true
    use_llm: false
    cache_enabled: true
    cache_path: "./data/cache/metadata_enrichment_cache.sqlite"
    max_tokens_per_chunk: 1200
    max_concurrency: 3
    budget_usd_per_run: 2.0
    estimated_cost_per_1k_tokens: 0.0005
    output_schema: "json"
    fallback_to_rule_based: true
    generate_questions: true
    extract_entities: true
    prompt_path: "config/prompts/metadata_enrichment_json.txt"

  # Legacy block kept for backward compatibility. Prefer metadata_enrichment.
  metadata_enricher:
    use_llm: false
