# Modular RAG MCP Server - Configuration
# This is the main configuration file for the MCP Server.
# Edit this file to configure LLM, Embedding, VectorStore, and other services.

# =============================================================================
# LLM Configuration
# =============================================================================
llm:
  provider: "bailian"  # Options: openai, azure, ollama, deepseek, bailian
  model: "qwen3.7-max"
  deployment_name: "qwen3.7-max"
  # azure_endpoint: "https://llm-jsx5kseq9wdhdrdb.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
  api_version: "2024-02-15-preview"
  base_url: "https://llm-jsx5kseq9wdhdrdb.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
  api_key: "${LLM_API_KEY:-}"
  temperature: 0.0
  max_tokens: 4096
  extra_body:
    enable_thinking: false

  # provider: "deepseek"  # Options: openai, azure, ollama, deepseek
  # model: "deepseek-v4-flash"
  # deployment_name: "deepseek-v4-flash"
  # # azure_endpoint: "https://llm-jsx5kseq9wdhdrdb.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
  # api_version: "2024-02-15-preview"
  # base_url: "	https://api.deepseek.com"
  # api_key: "${DEEPSEEK_API_KEY:-}"
  # temperature: 0.0
  # max_tokens: 4096

# =============================================================================
# Embedding Configuration
# =============================================================================
embedding:
  provider: "openai"  # Options: openai, azure, ollama
  model: "text-embedding-v4"
  dimensions: 1536  # text-embedding-ada-002 固定维度 (不传递给API, 仅用于验证)
  max_batch_size: 10  # OpenAI-compatible DashScope embeddings reject batches larger than 10.
  # Azure-compatible settings (azure_endpoint triggers Azure compat mode):
  # azure_endpoint: "https://llm-jsx5kseq9wdhdrdb.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
  # deployment_name: "text-embedding-v4"
  # api_version: "2024-02-15-preview"
  base_url: "https://llm-jsx5kseq9wdhdrdb.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
  api_key: "${EMBEDDING_API_KEY:-}"
  # OpenAI-specific settings (if provider is openai):
  # api_key: "${OPENAI_API_KEY:-}"

# =============================================================================
# Vision LLM Configuration (for Image Captioning)
# =============================================================================
vision_llm:
  enabled: true  # Set to true to enable vision capabilities
  provider: "openai"  # Options: openai, azure, ollama
  model: "qwen3-vl-plus"  # Options: gpt-4o, gpt-4-vision-preview (OpenAI), llava (Ollama)
  # Azure-compatible settings (azure_endpoint triggers Azure compat mode):
  base_url: "https://llm-jsx5kseq9wdhdrdb.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
  # azure_endpoint: "https://llm-jsx5kseq9wdhdrdb.cn-beijing.maas.aliyuncs.com/api/v1"
  # deployment_name: "qwen-image-2.0-pro-2026-04-22"
  # api_version: "2024-02-15-preview"
  api_key: "${VISION_LLM_API_KEY:-}"
  # Ollama-specific settings (if provider is ollama):
  # base_url: "http://localhost:11434"
  max_image_size: 2048  # Max dimension (width/height) for image compression

# =============================================================================
# Vector Store Configuration
# =============================================================================
vector_store:
  provider: "chroma"  # Options: chroma, qdrant, opensearch, pgvector
  persist_directory: "./data/db/chroma"
  collection_name: "knowledge_hub"
  qdrant:
    url: "${QDRANT_URL:-}"
    api_key: "${QDRANT_API_KEY:-}"
    collection_name: "knowledge_hub"
  opensearch:
    hosts: "${OPENSEARCH_HOSTS:-}"
    username: "${OPENSEARCH_USERNAME:-}"
    password: "${OPENSEARCH_PASSWORD:-}"
    index_name: "knowledge_hub"
  pgvector:
    dsn: "${PGVECTOR_DSN:-}"
    table_name: "rag_chunks"
    embedding_dimension: 1536

# =============================================================================
# Retrieval Configuration
# =============================================================================
retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  rrf_k: 60  # RRF constant
  sparse_backend: "sqlite_fts5"  # Options: json_bm25, sqlite_fts5
  fts5:
    db_path: "./data/db/sparse_fts5.db"
    tokenizer: "unicode61"  # Options: unicode61, trigram
    match_mode: "or"  # Options: or, and
    busy_timeout_ms: 10000
    max_retries: 3
  query_rewrite:
    enabled: false
    provider: "noop"
    timeout_seconds: 3
    token_budget: 512
    fallback_on_error: true
    synonyms: {}
    abbreviations: {}
    max_generated_queries: 3
  tokenizer:
    engine: "jieba"
    user_dict_path: "config/domain_terms.txt"
    stopwords_path: "config/stopwords.txt"
    enable_char_ngram: false
    char_ngram_min: 2
    char_ngram_max: 3
  boosting:
    enabled: false
    title_boost: 1.20
    heading_boost: 1.15
    tag_boost: 1.10
    exact_phrase_boost: 1.25
    source_type_boost: {}

# =============================================================================
# Rerank Configuration
# =============================================================================
rerank:
  enabled: true
  provider: "bailian"  # Options: none, cross_encoder, llm, bailian
  model: "qwen3-vl-rerank"
  endpoint: "https://llm-jsx5kseq9wdhdrdb.cn-beijing.maas.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank"
  api_format: "dashscope"
  instruct: "Given an enterprise knowledge-base query, rank passages by how directly and specifically they provide evidence to answer the query. Prioritize passages that mention the requested entities, projects, people, dates, decisions, statuses, tickets, documents, messages, or source records. Prefer exact supporting evidence over generic semantic similarity."
  api_key: "${DASHSCOPE_API_KEY:-}"
  top_k: 10
  candidate_top_k: 30
  output_top_k: 10
  timeout_seconds: 60
  fallback_on_timeout: true
  fallback_on_error: true
  retry:
    enabled: false
    max_attempts: 1
    backoff_seconds: 0.5
  cost_limit:
    enabled: false
    max_candidates_per_query: 50
    max_estimated_cost_per_query: 0.05
    estimated_cost_per_candidate: 0.001
  circuit_breaker:
    enabled: false
    failure_threshold: 5
    reset_after_seconds: 60
  provider_switching:
    enabled: false
  return_documents: true

# =============================================================================
# Evaluation Configuration
# =============================================================================
evaluation:
  enabled: false
  provider: "custom"  # Options: ragas, deepeval, custom
  metrics:
    - "hit_rate"
    - "mrr"
    - "faithfulness"

# =============================================================================
# Observability Configuration
# =============================================================================
observability:
  log_level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR
  trace_enabled: true
  trace_file: "./logs/traces.jsonl"
  structured_logging: true
  environment: "development"  # production forbids disabled redaction and prompt capture
  audit_file: "./logs/audit.jsonl"
  operational_file: "./logs/operational.jsonl"
  redaction:
    enabled: true
    max_text_length: 256
    hash_user_id: true
  trace:
    include_chunk_text: false
    include_prompt: false
    sampling_rate: 1.0
  retention:
    max_days: 30
    max_file_size_mb: 100
    rotation_count: 5

security:
  enabled: true
  mode: "local-dev"  # production requires verified JWT/OIDC context
  require_tenant: false
  require_authentication: false
  default_local_tenant: "local"
  default_local_user: "local-user"
  jwt:
    issuer: "${JWT_ISSUER:-}"
    audience: "${JWT_AUDIENCE:-}"
    secret: "${JWT_SECRET:-}"
  acl:
    enabled: true

# =============================================================================
# Production HTTP API / MCP Gateway
# =============================================================================
api:
  enabled: true
  host: "0.0.0.0"
  port: 8000
  environment: "development"
  auth:
    mode: "local-dev"
    allow_local_dev_without_auth: true
    jwt:
      algorithm: "HS256"
      secret: "${JWT_SECRET:-}"
      issuer: "${JWT_ISSUER:-rag-api}"
      audience: "${JWT_AUDIENCE:-rag-clients}"
      leeway_seconds: 30
  rate_limit:
    enabled: true
    backend: "memory"
    tenant:
      requests: 120
      window_seconds: 60
    user:
      requests: 60
      window_seconds: 60
  limits:
    max_request_body_bytes: 10485760
  timeout:
    query_seconds: 30
    retrieval_seconds: 8
    rerank_seconds: 10
    llm_seconds: 20
    ingestion_seconds: 300
  mcp_gateway:
    enabled: true

# =============================================================================
# Performance Configuration
# =============================================================================
performance:
  query_cache:
    enabled: true
    max_size: 128
    ttl_seconds: 300
  embedding_cache:
    enabled: true
    db_path: "./data/db/embedding_cache.db"

# =============================================================================
# Response Configuration
# =============================================================================
response:
  answer_generation:
    enabled: true
    default_mode: "contexts"
    min_contexts: 1
    min_score: 0.2
    max_context_chars: 8000
    default_answer_style: "concise"
    timeout_seconds: 20
    hallucination_guard:
      enabled: true
  claim_extraction:
    enabled: true
    provider: "rule_based"
    max_claims: 20
    llm:
      enabled: false
  citation_verification:
    enabled: true
    min_support_score: 0.35
    require_citations_for_factual_claims: true
    allow_uncited_refusal_answer: true
  refusal:
    enabled: true
    refuse_on_no_context: true
    refuse_on_low_score: true
    refuse_on_no_valid_citation: true
    refuse_on_prompt_injection: true
    refuse_on_unsupported_claims: true
    low_score_threshold: 0.2
    max_unsupported_claim_ratio: 0.35
    min_citation_coverage: 0.5
  confidence:
    enabled: true
    high_threshold: 0.75
    medium_threshold: 0.45
  source_conflict:
    enabled: true
    strict_mode: false
  safety:
    prompt_injection_detection: true

# =============================================================================
# Ingestion Configuration
# =============================================================================
ingestion:
  chunk_size: 1000
  chunk_overlap: 200
  splitter: "recursive"  # Options: recursive, semantic, fixed_length
  batch_size: 20
  concurrent_upload:
    enabled: true
    max_workers: 4
    job_db_path: "./data/db/ingestion_jobs.db"
    upload_dir: "./data/uploads/ingestion"
    storage_lock_scope: "collection"  # Options: collection, global
  task_queue:
    backend: "sqlite"
    db_path: "./data/db/ingestion_tasks.db"
    lease_seconds: 300
    heartbeat_interval_seconds: 30
    max_retries: 3
    retry_base_delay_seconds: 10
    retry_max_delay_seconds: 300
    retry_jitter: true
  parsing:
    enhanced_pdf:
      enabled: true
      preserve_existing_loader: true
      ocr:
        enabled: false
        engine: "tesseract"
        languages: ["chi_sim", "eng"]
        min_text_density: 20
        min_ocr_confidence: 0.60
        fallback_on_missing_dependency: true
      layout:
        enabled: true
        extract_blocks: true
        extract_images: true
        extract_coordinates: true
        detect_reading_order: true
      tables:
        enabled: true
        engine: "auto"
        fallback_to_text: true
        extract_markdown: true
        extract_cell_coordinates: true
        detect_cross_page: true
      headers_footers:
        enabled: true
        similarity_threshold: 0.85
        min_repeat_pages: 2
        top_margin_ratio: 0.12
        bottom_margin_ratio: 0.12
        exclude_from_chunks: true
      quality:
        enabled: true
        min_text_density: 20
        max_garbled_ratio: 0.20
        max_empty_page_ratio: 0.50
        max_duplicate_block_ratio: 0.40
        reject_on_garbled: false
        warning_on_low_quality: true
  chunking:
    strategy: "recursive"
    chunk_size: 1000
    chunk_overlap: 200
    recursive:
      separators:
        - "\n\n"
        - "\n"
        - "。"
        - "."
        - " "
        - ""
    markdown_header:
      headers:
        - ["#", "h1"]
        - ["##", "h2"]
        - ["###", "h3"]
        - ["####", "h4"]
      split_under_headers: true
      preserve_headers: true
    semantic:
      enabled: false
      embedding_provider: "openai"
      breakpoint_threshold_type: "percentile"
      breakpoint_threshold_amount: 95
      min_chunk_size: 300
      max_chunk_size: 1200
    parent_child:
      enabled: false
      parent_chunk_size: 1600
      parent_chunk_overlap: 200
      child_chunk_size: 500
      child_chunk_overlap: 80
      link_parent_child: true
      return_children_only: true
      return_parent_and_children: false
    sliding_window:
      window_size: 800
      step_size: 400
      preserve_sentence_boundary: true
    metadata:
      schema_validation: true
      validate_before_chunk: true
      validate_after_chunk: true
      validate_before_upsert: true
      validate_on_query_return: true
      strict_upsert_validation: true
    quality:
      enabled: true
      min_chars: 50
      max_chars: 3000
      max_garbled_ratio: 0.20
      max_duplicate_ratio: 0.40
      max_punctuation_ratio: 0.60
      reject_invalid: false
    section_aware:
      enabled: true
      max_section_chars: 3000
      merge_short_sections: true
    table_aware:
      enabled: true
      preserve_table_header: true
      max_table_rows_per_chunk: 30
    code_aware:
      enabled: true
      preserve_code_block: true
      max_code_lines_per_chunk: 120
    parent_child_retrieval:
      enabled: true
      return_parent_context: false
      max_parent_context_chars: 2000
    contextual_retrieval:
      enabled: false
      provider: "noop"
      preserve_original_text: true
      max_context_chars: 500
      cache:
        enabled: true
        db_path: "./data/db/contextualizer_cache.db"
      llm:
        enabled: false
        timeout_seconds: 20
        token_budget: 512
        fallback_on_error: true
        max_estimated_cost_per_document: 0.10
  supported_extensions:
    - ".pdf"
    - ".md"
    - ".txt"
    - ".html"
    - ".htm"
    - ".docx"
    - ".py"
    - ".js"
    - ".java"

  # Document Quality Gate
  document_quality:
    enabled: true
    sample_pages: 3
    min_effective_char_ratio: 0.8
    min_recognizable_text_density: 20
  
  # Chunk Refiner Configuration (C5)
  chunk_refiner:
    use_llm: false  # Set to true to enable LLM-based refinement (requires LLM config)
    # When use_llm is false or LLM call fails, falls back to rule-based refinement
  
  # Structured Metadata Enrichment Configuration (C6)
  # New configuration block. Takes precedence over legacy metadata_enricher.
  metadata_enrichment:
    enabled: true
    use_llm: false
    cache_enabled: true
    cache_path: "./data/cache/metadata_enrichment_cache.sqlite"
    max_tokens_per_chunk: 1200
    max_concurrency: 3
    budget_usd_per_run: 2.0
    estimated_cost_per_1k_tokens: 0.0005
    output_schema: "json"
    fallback_to_rule_based: true
    generate_questions: true
    extract_entities: true
    prompt_path: "config/prompts/metadata_enrichment_json.txt"

  # Legacy Metadata Enricher Configuration (kept for backward compatibility)
  metadata_enricher:
    use_llm: true  # Set to true to enable LLM-based enrichment (requires LLM config)
    # When use_llm is false or LLM call fails, falls back to rule-based enrichment
